# =============================================================================
# Step 8: Docker Compose — 認証機能追加（SECRET_KEY 追加）
# =============================================================================
#
# 【Step 7 からの変更点】
# - backend に SECRET_KEY 環境変数を追加
# - JWT トークンの署名に使用する秘密鍵
#
# 【SECRET_KEY とは？】
# JWT トークンの署名（HMAC-SHA256）に使用する秘密鍵。
# この鍵を知っている人だけがトークンを生成・検証できる。
#
# 【⚠️ セキュリティ上の注意】
# - 本番環境では docker-compose.yml にハードコードしない
# - .env ファイルや Docker Secrets を使う
# - ランダムで十分な長さ（32文字以上）にする
# - 鍵が漏洩したら全ユーザーのトークンが無効になるので交換する
#
# Step 13（プロダクション）で .env ファイルへの外出しを行う。
#
# =============================================================================

services:

  # ===========================================================================
  # PostgreSQL データベース
  # ===========================================================================
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: robot
      POSTGRES_PASSWORD: robot
      POSTGRES_DB: robotdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robot -d robotdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===========================================================================
  # Gateway サービス（Go WebSocket サーバー）
  # ===========================================================================
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===========================================================================
  # Backend サービス（Python FastAPI）— Step 8 更新
  # ===========================================================================
  #
  # 【Step 7 からの変更点】
  # - SECRET_KEY 環境変数を追加（JWT 署名用）
  #
  # 【環境変数で秘密鍵を渡す理由】
  # コードにハードコードすると、Git に秘密鍵がコミットされてしまう。
  # 環境変数で渡すことで、コードと秘密鍵を分離する（12 Factor App の原則）。
  #
  # 【12 Factor App】
  # Heroku の共同創業者が提唱したモダンアプリの設計原則。
  # 第3原則「設定を環境変数に格納する」に従っている。
  # → https://12factor.net/ja/config
  #
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: "postgresql+asyncpg://robot:robot@db:5432/robotdb"
      DATABASE_URL_SYNC: "postgresql+psycopg2://robot:robot@db:5432/robotdb"
      # --- Step 8 新規: JWT 署名用の秘密鍵 ---
      # 本番では .env ファイルに書き、docker-compose.yml にはハードコードしない。
      # openssl rand -hex 32 で生成するのが推奨。
      SECRET_KEY: "dev-secret-key-change-in-production-please"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===========================================================================
  # Frontend サービス（Nginx 静的ファイル配信）
  # ===========================================================================
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - gateway
      - backend
    restart: unless-stopped

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  pgdata:
