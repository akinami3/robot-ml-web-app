# =============================================================================
# Step 9: Docker Compose — React + Vite フロントエンド追加
# =============================================================================
#
# 【Step 8 からの変更点】
# - frontend サービスを Nginx 静的配信 → Vite 開発サーバーに変更
# - Vite はホットモジュールリプレースメント（HMR）を提供し、
#   ファイル変更時にページリロードなしで即座に反映される
#
# 【HMR（Hot Module Replacement）とは？】
# コードを変更したとき、ブラウザをリロードせずに変更部分だけを
# リアルタイムで入れ替える機能。開発体験が大幅に向上する。
# - CSS の変更 → 即座に反映（ページ状態を保持）
# - React コンポーネントの変更 → 即座に反映（state をなるべく保持）
#
# 【Vite とは？】
# フランス語で「速い」を意味する次世代フロントエンドビルドツール。
# 従来の webpack に比べ、起動が大幅に速い（ネイティブ ESM を活用）。
# Vue.js の作者 Evan You が開発した。
#
# =============================================================================

services:

  # ===========================================================================
  # PostgreSQL データベース
  # ===========================================================================
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: robot
      POSTGRES_PASSWORD: robot
      POSTGRES_DB: robotdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robot -d robotdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===========================================================================
  # Gateway サービス（Go WebSocket サーバー）
  # ===========================================================================
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===========================================================================
  # Backend サービス（Python FastAPI）— Step 8 更新
  # ===========================================================================
  #
  # 【Step 7 からの変更点】
  # - SECRET_KEY 環境変数を追加（JWT 署名用）
  #
  # 【環境変数で秘密鍵を渡す理由】
  # コードにハードコードすると、Git に秘密鍵がコミットされてしまう。
  # 環境変数で渡すことで、コードと秘密鍵を分離する（12 Factor App の原則）。
  #
  # 【12 Factor App】
  # Heroku の共同創業者が提唱したモダンアプリの設計原則。
  # 第3原則「設定を環境変数に格納する」に従っている。
  # → https://12factor.net/ja/config
  #
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: "postgresql+asyncpg://robot:robot@db:5432/robotdb"
      DATABASE_URL_SYNC: "postgresql+psycopg2://robot:robot@db:5432/robotdb"
      # --- Step 8 新規: JWT 署名用の秘密鍵 ---
      # 本番では .env ファイルに書き、docker-compose.yml にはハードコードしない。
      # openssl rand -hex 32 で生成するのが推奨。
      SECRET_KEY: "dev-secret-key-change-in-production-please"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===========================================================================
  # Frontend サービス（React + Vite 開発サーバー）— Step 9 更新
  # ===========================================================================
  #
  # 【Step 8 からの変更点】
  # - Nginx 静的配信 → Vite 開発サーバーに変更
  # - ソースコードのボリュームマウントで HMR（ホットリロード）を実現
  # - node_modules は匿名ボリュームで Docker 内に保持
  #
  # 【なぜ node_modules を匿名ボリュームにするのか？】
  # ./frontend:/app でホスト全体をマウントすると、ホスト側の node_modules が
  # Docker 内の node_modules を上書きしてしまう。
  # /app/node_modules を別ボリュームにすることで、Docker 内の npm ci で
  # インストールされたパッケージを保護する（Linux 向けバイナリが必要なため）。
  #
  # 【ポート 3000】
  # Vite 開発サーバーがポート 3000 で起動する（vite.config.ts で設定済み）。
  # ブラウザから http://localhost:3000 でアクセスできる。
  #
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - gateway
      - backend
    restart: unless-stopped

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  pgdata:
