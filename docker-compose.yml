# =============================================================================
# Step 6: Docker Compose — 3サービス構成
# =============================================================================
#
# 【Step 5 からの変更点】
# Step 5: gateway + frontend の2サービス
# Step 6: gateway + frontend + backend の3サービス（← 新規追加！）
#
# 【3サービスの役割】
# ┌──────────┐    HTTP     ┌──────────┐
# │ frontend │ ──fetch()──→│ backend  │  ← FastAPI（REST API）
# │ (nginx)  │             │ (Python) │
# │ :3000    │             │ :8000    │
# └──────────┘             └──────────┘
#       │
#       │ WebSocket
#       ▼
# ┌──────────┐
# │ gateway  │  ← Go（リアルタイム通信）
# │ (Go)     │
# │ :8080    │
# └──────────┘
#
# フロントエンドは2つのバックエンドと通信する:
#   1. backend (REST API): ロボット管理（CRUD）
#   2. gateway (WebSocket): リアルタイム制御・センサーデータ
#
# 【networks の意味】
# Docker Compose はデフォルトで同一ネットワークを作成する。
# 明示的に定義することで、どのサービスが通信できるか明確にする。
#
# =============================================================================

services:

  # ===========================================================================
  # Gateway サービス（Go WebSocket サーバー）— Step 3 から継続
  # ===========================================================================
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===========================================================================
  # Backend サービス（Python FastAPI）— Step 6 新規
  # ===========================================================================
  #
  # 【build セクション】
  # context: ./backend をビルドコンテキストに指定
  # dockerfile: Dockerfile.dev を使用（開発用、--reload 付き）
  #
  # 【volumes セクション】
  # ./backend:/app でホストのソースコードをコンテナにマウント。
  # これにより、ホスト側でファイルを編集すると、
  # uvicorn の --reload がファイル変更を検知して自動リスタートする。
  # → コンテナの再ビルドなしに、コード変更がすぐ反映される！
  #
  # 【ports セクション】
  # 8000:8000 でバックエンドの API をホストから直接アクセスできるようにする。
  # → ブラウザで http://localhost:8000/docs にアクセスすると API ドキュメントが見える
  #
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===========================================================================
  # Frontend サービス（Nginx 静的ファイル配信）— Step 3 から継続
  # ===========================================================================
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - gateway
      - backend
    restart: unless-stopped
