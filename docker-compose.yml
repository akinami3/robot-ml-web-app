# =============================================================================
# Step 3: Docker Compose — 基本構成
# =============================================================================
#
# 【Docker Compose とは？】
# 複数のコンテナ（サービス）をまとめて起動・管理するツール。
# このファイル1つで、以下のサービスを一括で起動できる:
#   - gateway: Go WebSocket サーバー
#   - frontend: Nginx で静的ファイルを配信
#
# 【使い方】
#   docker compose up --build    ← ビルド＆起動
#   docker compose down          ← 停止＆削除
#   docker compose logs gateway  ← ログ確認
#
# 【ローカル開発（Docker なし）との違い】
# Docker なし:
#   ターミナル1: cd gateway && go run cmd/gateway/main.go
#   ターミナル2: cd frontend && python -m http.server 3000
#   → 2つのターミナルが必要、ポートがバラバラ
#
# Docker Compose:
#   docker compose up --build
#   → 1コマンドで全サービス起動、ポートも固定
#
# =============================================================================

# =============================================================================
# バージョン指定
# =============================================================================
# Docker Compose V2 ではバージョン指定は不要だが、
# 明示的に書くとどの仕様に従っているか明確になる。

# =============================================================================
# サービス定義
# =============================================================================
services:

  # ===========================================================================
  # Gateway サービス（Go WebSocket サーバー）
  # ===========================================================================
  #
  # 【build セクション】
  # context: Dockerfile がある、ビルドコンテキストのルートディレクトリ
  # dockerfile: 使用する Dockerfile のパス
  #
  # 【ports セクション】
  # "ホスト:コンテナ" の形式。
  # "8080:8080" = ホストの 8080 番ポートをコンテナの 8080 番に転送。
  # → ブラウザから localhost:8080 でアクセスすると、コンテナの 8080 に届く。
  #
  # 【restart セクション】
  # unless-stopped: 明示的に停止しない限り、クラッシュしても自動再起動。
  # 開発中はサーバーが落ちても自動で復活する。
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    # ヘルスチェック: /health エンドポイントで生存確認
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===========================================================================
  # Frontend サービス（Nginx 静的ファイル配信）
  # ===========================================================================
  #
  # 【Nginx とは？】
  # 高性能な Web サーバー。ここでは HTML/CSS/JS ファイルを配信する。
  # ブラウザが localhost:3000 にアクセスすると、
  # Nginx が frontend/ ディレクトリのファイルを返す。
  #
  # 【volumes セクション】
  # ホストのディレクトリをコンテナにマウント（共有）する。
  # ./frontend:/usr/share/nginx/html:ro
  #   ホスト側: ./frontend ディレクトリ
  #   コンテナ側: /usr/share/nginx/html（Nginx のデフォルト配信ディレクトリ）
  #   :ro = read-only（コンテナからは読み取り専用）
  #
  # 【depends_on セクション】
  # gateway サービスが先に起動してから frontend を起動する。
  # WebSocket 接続先がないと、フロントエンドがエラーになるため。
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - gateway
    restart: unless-stopped
