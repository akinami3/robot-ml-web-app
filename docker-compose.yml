# =============================================================================
# Step 12: Docker Compose — Ollama LLM + Redis 追加
# =============================================================================
#
# 【Step 9 からの変更点】
# - redis サービスを追加（Step 11: データ記録用）
# - ollama サービスを追加（Step 12: RAG の LLM サーバー）
# - backend に REDIS_URL, OLLAMA_URL 環境変数を追加
# - gateway に REDIS_URL 環境変数を追加
#
# 【サービス構成（Step 12: 6サービス）】
#
#   ブラウザ → frontend (Vite :3000)
#           → gateway  (WebSocket :8080) → Redis
#           → backend  (FastAPI :8000) → PostgreSQL
#                                          → Redis
#                                          → Ollama (LLM :11434)
#
# 【Ollama とは？】
# ローカルで LLM（大規模言語モデル）を動かせるオープンソースツール。
# Docker コンテナとして起動し、HTTP API で LLM にアクセスできる。
# llama3, mistral, gemma, nomic-embed-text など多数のモデルをサポート。
#
# =============================================================================

services:

  # ===========================================================================
  # PostgreSQL データベース
  # ===========================================================================
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: robot
      POSTGRES_PASSWORD: robot
      POSTGRES_DB: robotdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robot -d robotdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===========================================================================
  # Gateway サービス（Go WebSocket サーバー）— Step 12 更新
  # ===========================================================================
  #
  # 【Step 11 からの変更点】
  # - REDIS_URL 環境変数を追加（Redis Streams へのデータ公開用）
  # - redis サービスへの依存関係を追加
  #
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Step 11: Redis にセンサーデータを公開する
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===========================================================================
  # Backend サービス（Python FastAPI）— Step 8 更新
  # ===========================================================================
  #
  # 【Step 7 からの変更点】
  # - SECRET_KEY 環境変数を追加（JWT 署名用）
  #
  # 【環境変数で秘密鍵を渡す理由】
  # コードにハードコードすると、Git に秘密鍵がコミットされてしまう。
  # 環境変数で渡すことで、コードと秘密鍵を分離する（12 Factor App の原則）。
  #
  # 【12 Factor App】
  # Heroku の共同創業者が提唱したモダンアプリの設計原則。
  # 第3原則「設定を環境変数に格納する」に従っている。
  # → https://12factor.net/ja/config
  #
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: "postgresql+asyncpg://robot:robot@db:5432/robotdb"
      DATABASE_URL_SYNC: "postgresql+psycopg2://robot:robot@db:5432/robotdb"
      # --- Step 8 新規: JWT 署名用の秘密鍵 ---
      # 本番では .env ファイルに書き、docker-compose.yml にはハードコードしない。
      # openssl rand -hex 32 で生成するのが推奨。
      SECRET_KEY: "dev-secret-key-change-in-production-please"
      # --- Step 11: Redis 接続 ---
      REDIS_URL: "redis://redis:6379/0"
      # --- Step 12: Ollama LLM 接続 ---
      OLLAMA_URL: "http://ollama:11434"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===========================================================================
  # Redis — メッセージキュー + キャッシュ（Step 11 追加）
  # ===========================================================================
  #
  # 【Redis の役割】
  # 1. Redis Streams: Gateway → Backend のセンサーデータ転送
  # 2. Pub/Sub: リアルタイム通知
  # 3. キャッシュ: 頻繁にアクセスするデータの高速読み出し
  #
  # 【Redis Streams とは？】
  # メッセージキューの一種。時系列でメッセージを保存し、
  # Consumer Group パターンで複数のワーカーが並列処理できる。
  # 従来の Kafka に比べて軽量で、組み込みが簡単。
  #
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # appendonly: データを永続化（Redis再起動後もデータが残る）
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===========================================================================
  # Ollama — ローカル LLM サーバー（Step 12 追加）
  # ===========================================================================
  #
  # 【Ollama とは？】
  # ローカルで LLM（大規模言語モデル）を実行するツール。
  # クラウド API (OpenAI, Claude) を使わず、自分のマシンで AI を動かせる。
  #
  # 【メリット】
  # - データがローカルに留まる（プライバシー保護）
  # - API 料金がかからない
  # - オフライン環境でも動作可能
  #
  # 【使用するモデル】
  # - llama3: テキスト生成（質問応答）用 — 約4GBのストレージが必要
  # - nomic-embed-text: テキスト埋め込み（ベクトル化）用 — 約270MB
  #
  # 初回起動時にモデルのダウンロードが必要:
  #   docker exec -it <container> ollama pull llama3
  #   docker exec -it <container> ollama pull nomic-embed-text
  #
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # ===========================================================================
  # Frontend サービス（React + Vite 開発サーバー）— Step 9 更新
  # ===========================================================================
  #
  # 【Step 8 からの変更点】
  # - Nginx 静的配信 → Vite 開発サーバーに変更
  # - ソースコードのボリュームマウントで HMR（ホットリロード）を実現
  # - node_modules は匿名ボリュームで Docker 内に保持
  #
  # 【なぜ node_modules を匿名ボリュームにするのか？】
  # ./frontend:/app でホスト全体をマウントすると、ホスト側の node_modules が
  # Docker 内の node_modules を上書きしてしまう。
  # /app/node_modules を別ボリュームにすることで、Docker 内の npm ci で
  # インストールされたパッケージを保護する（Linux 向けバイナリが必要なため）。
  #
  # 【ポート 3000】
  # Vite 開発サーバーがポート 3000 で起動する（vite.config.ts で設定済み）。
  # ブラウザから http://localhost:3000 でアクセスできる。
  #
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - gateway
      - backend
    restart: unless-stopped

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  pgdata:
  redis_data:
  ollama_data:
