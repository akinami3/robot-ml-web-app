<!DOCTYPE html>
<!--
  =============================================================================
  Step 7: Database — PostgreSQL + SQLAlchemy による永続化
  =============================================================================

  【Step 6 からの変更点】
  1. バックエンドが PostgreSQL データベースに接続
  2. ロボットデータが永続化される（再起動しても消えない）
  3. フロントエンドの変更はほぼなし（API の形が同じだから！）
  4. Clean Architecture: ドメイン層 / インフラ層の分離

  【ページ構成】
    #/           → ロボット一覧（ダッシュボード）
    #/robots     → ロボット一覧
    #/robots/new → ロボット登録フォーム
    #/control    → リアルタイム制御（Step 5 の画面）

  【ファイル構成】
  Step 6:
    ├── index.html              ← このファイル（シェル + ナビ + ルーターコンテナ）
    ├── css/
    │   └── style.css           ← ページ追加分のスタイル
    └── js/
        ├── app.js              ← ルーター統合 + WS 管理
        ├── router.js           ← ハッシュルーター
        ├── api.js              ← REST API クライアント（fetch）
        ├── protocol.js         ← WS プロトコル
        ├── protocol-base.js    ← Step 2 メッセージ
        ├── websocket-client.js ← WS 接続管理
        ├── pages/
        │   ├── robot-list.js   ← ロボット一覧ページ
        │   ├── robot-form.js   ← 登録/編集フォーム
        │   └── control.js      ← リアルタイム制御ページ
        └── sensors/            ← Step 4 センサービューア
  =============================================================================
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step 7: Database 🗄️</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <!-- ================================================================
       ナビゲーションバー（Step 6 新規）
       ================================================================
       SPA ではナビゲーションは常に表示され、
       クリック時に URL のハッシュが変わりページが切り替わる。
       <a href="#/robots"> の # がハッシュルーティングのポイント。
       ================================================================ -->
  <nav class="navbar">
    <div class="navbar-brand">
      <span class="brand-icon">🤖</span>
      <span class="brand-name">Robot AI Web App</span>
      <span class="brand-step">Step 7</span>
    </div>

    <div class="navbar-links">
      <!-- data-route: ルーターが active クラスを付与するために使用 -->
      <a href="#/" data-route="/" class="nav-link">📋 ロボット一覧</a>
      <a href="#/robots/new" data-route="/robots/new" class="nav-link">＋ 新規登録</a>
      <a href="#/control" data-route="/control" class="nav-link">🎮 制御</a>
    </div>

    <div class="navbar-info">
      <!-- API の接続状態を表示 -->
      <span class="api-status" id="apiStatus">
        <span class="api-dot"></span> API
      </span>
    </div>
  </nav>

  <!-- ================================================================
       ページコンテンツ領域
       ================================================================
       ルーターがこの div の innerHTML を書き換えることで
       ページ遷移を実現する。ナビゲーションは固定。
       ================================================================ -->
  <main class="main-content">
    <div id="page-content">
      <!-- ルーターによって動的にページが挿入される -->
      <div class="loading">読み込み中...</div>
    </div>
  </main>

  <!-- ================================================================
       フッター
       ================================================================ -->
  <footer class="footer">
    <span>Step 7: Database — PostgreSQL + SQLAlchemy + Clean Architecture</span>
  </footer>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
