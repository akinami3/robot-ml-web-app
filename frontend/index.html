<!DOCTYPE html>
<!--
  =============================================================================
  Step 9: React Migration — React 18 + TypeScript + Vite
  =============================================================================

  【Step 8 からの変更点】
  Step 8 では Vanilla JavaScript + ハッシュルーターでフロントエンドを構築しました。
  Step 9 では、以下の技術に移行します:

  1. React 18        — コンポーネントベースの UI ライブラリ
  2. TypeScript       — 型安全な JavaScript（開発時のエラー検出）
  3. Vite             — 高速ビルドツール + HMR（Hot Module Replacement）
  4. React Router v6  — SPA のページ遷移管理
  5. Zustand          — 軽量な状態管理ライブラリ
  6. TanStack Query   — サーバーデータ取得・キャッシュ管理
  7. Axios            — HTTP クライアント + インターセプター（認証トークン自動付与）
  8. Tailwind CSS     — ユーティリティファースト CSS フレームワーク

  【Vite のエントリーポイント】
  この index.html が Vite の「エントリーポイント」です。
  従来の Webpack と異なり、Vite は index.html をルートとして扱います。
  <script type="module" src="/src/main.tsx"> が React アプリの起動点です。

  【SPA（シングルページアプリケーション）とは？】
  ブラウザが最初にこの HTML を1回だけ読み込み、以降のページ遷移は
  JavaScript（React Router）が処理します。ページ全体のリロードは不要です。
  Step 8 のハッシュルーター（#/login）と違い、通常の URL（/login）を使います。

  【ファイル構成の変化】
  Step 8 → Step 9:
    frontend/
    ├── index.html              ← ★ Vite エントリーポイント（このファイル）
    ├── package.json            ← ★ React + TypeScript + 各種ライブラリ
    ├── vite.config.ts          ← ★ Vite 設定 + プロキシ + @ エイリアス
    ├── tsconfig.json           ← ★ TypeScript 設定（strict mode）
    ├── tailwind.config.js      ← ★ Tailwind CSS テーマ設定
    ├── postcss.config.js       ← ★ PostCSS プラグイン設定
    ├── Dockerfile.dev          ← ★ Vite dev server 用
    └── src/
        ├── main.tsx            ← ★ React ルート + Provider 設定
        ├── App.tsx             ← ★ ルーティング定義
        ├── index.css           ← ★ Tailwind + CSS 変数（テーマ）
        ├── types/index.ts      ← ★ 型定義
        ├── services/api.ts     ← ★ Axios + インターセプター
        ├── stores/authStore.ts ← ★ Zustand 認証ストア
        ├── stores/robotStore.ts← ★ Zustand ロボットストア
        ├── lib/utils.ts        ← ★ ユーティリティ関数
        ├── components/
        │   ├── layout/
        │   │   ├── AppLayout.tsx  ← ★ Sidebar + Outlet シェル
        │   │   └── Sidebar.tsx    ← ★ ナビゲーション
        │   └── ui/
        │       └── primitives.tsx ← ★ 基本UIコンポーネント
        └── pages/
            ├── LoginPage.tsx      ← ★ useState + authApi
            ├── SignupPage.tsx      ← ★ バリデーション + 自動ログイン
            ├── DashboardPage.tsx   ← ★ useQuery + ロボット一覧
            └── SettingsPage.tsx    ← ★ localStorage + テーマ切替

  =============================================================================
-->
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot AI — Step 9</title>
    <!--
      【Vite の CSS 読み込み】
      Tailwind CSS は src/index.css に定義されており、
      main.tsx から import されます。Vite が自動的に <style> タグを挿入するため、
      ここに <link> タグは不要です。
    -->
  </head>
  <body>
    <!--
      【React のマウントポイント】
      id="root" の <div> が React アプリケーションのマウント先です。
      React は ReactDOM.createRoot(document.getElementById("root")) で
      この要素を取得し、内部に仮想 DOM を描画します。

      Step 8 では <div id="page-content"> にページを直接書き込んでいましたが、
      React では「仮想 DOM（Virtual DOM）」を使って効率的に UI を更新します。
    -->
    <div id="root"></div>

    <!--
      【Vite のモジュール読み込み】
      type="module" を指定すると、ブラウザのネイティブ ES Modules として読み込まれます。
      Vite の開発サーバーは、このファイルを起点に依存関係を解析し、
      必要なモジュールをオンデマンドで変換・提供します（バンドルしないので高速）。

      /src/main.tsx — React アプリのエントリーポイント
      ここから App.tsx → 各ページコンポーネント へと読み込みが連鎖します。
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
