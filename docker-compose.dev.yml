# =============================================================================
# Step 13: Docker Compose 開発用オーバーレイ
# =============================================================================
#
# 【このファイルの役割】
# docker-compose.yml（ベース設定）を開発用にカスタマイズするオーバーレイ定義。
# ボリュームマウントやポート公開など、開発時に便利な設定を追加する。
#
# 【使い方】
# docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# または scripts/dev.sh を実行
#
# 【オーバーレイ（Override）とは？】
# Docker Compose は複数の YAML ファイルを「重ね合わせ」できる。
# 後に指定したファイルの設定が前のファイルを上書き（オーバーレイ）する。
#
# 例:
#   docker-compose.yml:     backend.ports: ["8000:8000"]
#   docker-compose.dev.yml: backend.volumes: ["./backend:/app"]
#   → 結果: ports + volumes の両方が有効になる
#
# 【なぜオーバーレイを使うのか？】
# - docker-compose.yml: 共通設定（どの環境でも同じ部分）
# - docker-compose.dev.yml: 開発者向け（ホットリロード、デバッグポート）
# - docker-compose.prod.yml: 本番向け（リソース制限、ログ管理）
#
# これにより、1つの docker-compose.yml を環境ごとに分岐させずに済む。
# DRY（Don't Repeat Yourself）原則を Docker Compose にも適用。
#
# =============================================================================

services:

  # ===========================================================================
  # Gateway — 開発用設定
  # ===========================================================================
  #
  # 【ボリュームマウントの意味】
  # ホストの ./gateway ディレクトリを Docker コンテナ内の /app にマウントする。
  # ファイルを編集すると、コンテナ内にも即座に反映される（ホットリロード）。
  #
  # 【Air（.air.toml）】
  # Go のホットリロードツール。ソースコードの変更を検知して自動でビルド&再起動する。
  # Go はコンパイル言語なので、Python や JavaScript と違いファイル変更時に再ビルドが必要。
  # Air がこの再ビルドを自動で行ってくれる。
  #
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile.dev
    volumes:
      - ./gateway:/app
    environment:
      # Air（ホットリロード）を有効化
      AIR_ENABLED: "true"
      # デバッグログを有効化
      LOG_LEVEL: "debug"

  # ===========================================================================
  # Backend — 開発用設定
  # ===========================================================================
  #
  # 【uvicorn --reload】
  # FastAPI の開発サーバーは --reload オプションでホットリロードを有効化する。
  # Python ファイルの変更を検知して自動で再起動してくれる。
  # command で上書きすることで、開発時だけ --reload を有効にする。
  #
  backend:
    volumes:
      - ./backend:/app
    environment:
      DEBUG: "true"
      LOG_LEVEL: "DEBUG"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug"

  # ===========================================================================
  # Frontend — 開発用設定（Vite HMR）
  # ===========================================================================
  #
  # 【Vite 開発サーバー】
  # ベースの docker-compose.yml で既に Vite 開発サーバーが設定されている。
  # ここでは追加の開発環境変数を設定する。
  #
  frontend:
    environment:
      NODE_ENV: development
      # Vite のソースマップを有効化（デバッグ用）
      VITE_SOURCEMAP: "true"

  # ===========================================================================
  # Database — 開発用設定
  # ===========================================================================
  db:
    ports:
      # 開発時はホストから直接接続できるようにポートを公開
      # psql -h localhost -U robot -d robotdb でアクセス可能
      - "5432:5432"

  # ===========================================================================
  # Redis — 開発用設定
  # ===========================================================================
  redis:
    ports:
      # 開発時はホストから redis-cli でアクセス可能
      - "6379:6379"
