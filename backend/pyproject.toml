# =============================================================================
# Step 8: Python プロジェクト設定（認証ライブラリ追加）
# =============================================================================
#
# 【Step 7 からの追加ライブラリ】
# - passlib[bcrypt]: パスワードハッシュ（bcrypt アルゴリズム）
# - python-jose[cryptography]: JWT トークンの生成・検証
# - bcrypt: passlib のバックエンド
#
# 【なぜ passlib + python-jose？】
# passlib: 複数のハッシュアルゴリズムを統一的に扱える
# python-jose: JWT の生成・検証が簡潔（PyJWT の代替）
#
# =============================================================================

[project]
name = "robot-backend"
version = "0.3.0"
description = "Robot AI Web App — FastAPI バックエンド（認証対応）"
requires-python = ">=3.11"

dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.29.0",
    "pydantic>=2.7.0",
    # --- Step 7: DB ---
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29.0",
    "alembic>=1.13.0",
    "psycopg2-binary>=2.9.9",
    # --- Step 8: 認証 ---
    "passlib[bcrypt]>=1.7.4",    # パスワードハッシュ（bcrypt）
    "python-jose[cryptography]>=3.3.0",  # JWT トークン
    "bcrypt>=4.0.0",             # bcrypt バックエンド
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
    "aiosqlite>=0.20.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
