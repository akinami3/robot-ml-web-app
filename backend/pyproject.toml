# =============================================================================
# Step 6: Python プロジェクト設定ファイル
# =============================================================================
#
# 【pyproject.toml とは？】
# Python プロジェクトのメタデータと依存関係を宣言するファイル。
# Node.js の package.json に相当する。
#
# 従来は setup.py + requirements.txt だったが、
# PEP 621 により pyproject.toml に一本化される流れ。
#
# 【pip install -e ".[dev]" の意味】
#   -e: "editable" モード（ソース変更が即座に反映）
#   .[dev]: このプロジェクト本体 + dev 依存をインストール
# =============================================================================

[project]
name = "robot-backend"
version = "0.1.0"
description = "Robot AI Web App — FastAPI バックエンド"
requires-python = ">=3.11"

# --- 本番依存 ---
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.29.0",
    "pydantic>=2.7.0",
]

# --- 開発用依存（テスト、リンターなど） ---
[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "httpx>=0.27.0",       # FastAPI の TestClient 用
]

# =============================================================================
# 【ビルドシステム】
# Python パッケージのビルドに使用するツールを指定。
# setuptools は最も一般的なビルドバックエンド。
# =============================================================================
[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
