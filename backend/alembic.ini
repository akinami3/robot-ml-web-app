# =============================================================================
# Step 7: Alembic 設定ファイル
# =============================================================================
#
# 【Alembic とは？】
# SQLAlchemy のデータベースマイグレーションツール。
# テーブルのスキーマ変更（カラム追加、テーブル作成/削除）を
# バージョン管理する。
#
# なぜ必要？
#   開発中にテーブル構造は何度も変わる。
#   毎回 DROP TABLE して作り直すわけにはいかない（データが消える）。
#   → Alembic がスキーマの差分を「マイグレーション」として管理する。
#
# Go の世界では:
#   - golang-migrate
#   - goose
#   が同様のツール。
#
# 【使い方】
#   alembic upgrade head    → 最新のマイグレーションを適用
#   alembic downgrade -1    → 1つ前のバージョンに戻す
#   alembic revision -m "add users table"  → 新しいマイグレーションを作成
#
# =============================================================================

[alembic]
# マイグレーションスクリプトのディレクトリ
script_location = alembic

# DB 接続 URL（env.py 内で Python コードから上書きするため、ここはダミー）
sqlalchemy.url = postgresql://robot:robot@db:5432/robotdb

# =============================================================================
# ロギング設定
# =============================================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
